name = "baihutv"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "public"

# ──────────────────────────────────────────────────────────
# 环境变量（也可在 CF Dashboard → Settings → Variables 设置）
# ──────────────────────────────────────────────────────────
[vars]
# ┌─────────────────────────────────────────────────────────┐
# │  SITE_PASSWORD  访问密码（必须修改！）                    │
# │  默认值: baihu2025                                        │
# └─────────────────────────────────────────────────────────┘
SITE_PASSWORD = "baihu2025"

# ┌─────────────────────────────────────────────────────────┐
# │  STRICT_PROXY  代理白名单严格模式                         │
# │  true = 只允许白名单域名  false = 允许所有域名（推荐）    │
# └─────────────────────────────────────────────────────────┘
STRICT_PROXY = "false"

# ──────────────────────────────────────────────────────────
# D1 数据库绑定（可选，用于多端同步）
# 使用前需先在 CF Dashboard 创建 D1 数据库
# ──────────────────────────────────────────────────────────
# [[d1_databases]]
# binding = "DB"
# database_name = "baihutv-db"
# database_id = "YOUR_D1_DATABASE_ID"   # ← 替换为你的D1 ID

# ──────────────────────────────────────────────────────────
# 生产环境覆盖
# ──────────────────────────────────────────────────────────
[env.production]
[env.production.vars]
STRICT_PROXY = "false"
