<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="description" content="白狐影视 - 高清影视聚合播放">
  <title>白狐影视</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦊</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ══════════════════════ 登录页 ══════════════════════ -->
<div id="loginPage">
  <div class="login-box" id="loginBox">
    <div class="login-logo">🦊</div>
    <div class="login-title">白狐影视</div>
    <div class="login-sub">请输入访问密码</div>
    <div class="login-inp-wrap">
      <input class="login-inp" type="password" id="pwdInput" placeholder="输入密码..." autocomplete="current-password">
      <button class="login-eye" id="eyeBtn" onclick="togglePwd()" title="显示/隐藏密码">👁</button>
    </div>
    <button class="login-btn" onclick="doLogin()">进入</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ══════════════════════ 主应用（登录后显示）══════════════════════ -->
<div id="app" style="display:none">

  <!-- 导航 -->
  <header class="hdr">
    <div class="logo" onclick="goHome()">
      <span class="logo-icon">🦊</span>
      <span class="logo-name">白狐影视</span>
    </div>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="搜索电影、剧集、动漫..." autocomplete="off">
      <button onclick="doSearch()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
    </div>
    <nav class="nav">
      <button class="nav-btn" onclick="loadCat('电影')">电影</button>
      <button class="nav-btn" onclick="loadCat('电视剧')">电视剧</button>
      <button class="nav-btn" onclick="loadCat('动漫')">动漫</button>
      <button class="nav-btn" onclick="loadCat('综艺')">综艺</button>
    </nav>
    <div class="hdr-right">
      <button class="icon-btn" onclick="showHist()" title="历史记录">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
      </button>
      <button class="icon-btn" onclick="openSettings()" title="设置">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </header>

  <!-- 首页 -->
  <div id="homePage">
    <section class="hero">
      <div class="hero-bg" id="heroBg"></div>
      <div class="hero-mask"></div>
      <div class="hero-body">
        <span class="hero-tag" id="heroTag">推荐</span>
        <h1 class="hero-title" id="heroTitle">正在加载…</h1>
        <p class="hero-desc" id="heroDesc"></p>
        <div class="hero-btns">
          <button class="btn-pri" onclick="playHero()">▶ 立即播放</button>
          <button class="btn-ghost" onclick="detailHero()">查看详情</button>
        </div>
      </div>
      <div class="hero-dots" id="heroDots"></div>
    </section>
    <div class="home-wrap" id="homeWrap"></div>
  </div>

  <!-- 列表/搜索结果页 -->
  <div id="listPage" style="display:none">
    <div class="list-hdr">
      <button class="back-btn" onclick="closePage('listPage')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
        返回
      </button>
      <h2 class="list-title" id="listTitle"></h2>
      <div class="list-filters" id="listFilters"></div>
    </div>
    <div class="grid-wrap" id="listGrid"></div>
    <div id="listMore" style="display:none;text-align:center;padding:20px">
      <button class="btn-more" onclick="loadMoreList()">加载更多</button>
    </div>
  </div>

  <!-- 播放器页 -->
  <div id="playerPage" style="display:none">
    <div class="p-topbar">
      <button class="back-btn" onclick="closePage('playerPage')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
        返回
      </button>
      <span class="p-title" id="pTopTitle"></span>
      <div class="p-ctrls">
        <select id="resSelect" class="sel" onchange="changeRes(this.value)">
          <option value="1080">1080P</option>
          <option value="720">720P</option>
          <option value="480">480P</option>
          <option value="360" selected>360P</option>
        </select>
        <select id="srcSelect" class="sel" onchange="changeSrc(this.value)"></select>
      </div>
    </div>
    <div class="p-layout">
      <div class="video-box">
        <video id="vid" controls preload="metadata" playsinline></video>
        <div class="vid-overlay">
          <div class="spin-wrap" id="spinWrap" style="display:none">
            <div class="spin"></div>
            <div style="font-size:13px;margin-top:6px">加载中…</div>
          </div>
          <div class="vid-err" id="vidErr" style="display:none">
            <div style="font-size:32px">⚠️</div>
            <p>当前线路播放失败</p>
            <button onclick="tryNextSrc()">尝试下一线路</button>
          </div>
        </div>
      </div>
      <div class="p-side">
        <div class="side-sec">
          <div class="side-hd">
            <span>选集</span>
            <span class="side-badge" id="epCount"></span>
          </div>
          <div class="ep-grid" id="epGrid"></div>
        </div>
        <div class="side-sec">
          <div class="side-hd">相关推荐</div>
          <div id="relList"></div>
        </div>
      </div>
    </div>
    <div class="p-info">
      <h2 id="pTitle"></h2>
      <div class="p-meta" id="pMeta"></div>
      <p class="p-desc" id="pDesc"></p>
    </div>
  </div>

</div><!-- /#app -->

<!-- ══════════════════════ 设置抽屉 ══════════════════════ -->
<div class="overlay" id="settOverlay" onclick="closeSettings()"></div>
<div class="drawer" id="settDrawer">
  <div class="drawer-hd">
    <h3>⚙️ 设置</h3>
    <button class="icon-btn" onclick="closeSettings()">✕</button>
  </div>
  <div class="drawer-body">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('tabApi',this)">API 管理</button>
      <button class="tab" onclick="switchTab('tabPlay',this)">播放</button>
      <button class="tab" onclick="switchTab('tabSync',this)">云同步</button>
      <button class="tab" onclick="switchTab('tabAppear',this)">外观</button>
    </div>

    <!-- ── API 管理 ── -->
    <div id="tabApi" class="tab-panel active">
      <div class="api-toolbar">
        <button class="btn-sm btn-accent" onclick="openAddApi()">＋ 添加</button>
        <button class="btn-sm" id="scanBtn" onclick="scanApis()">🔍 抓取可用API</button>
        <button class="btn-sm" id="testAllBtn" onclick="testAllApis()">⚡ 全部测速</button>
      </div>
      <div id="scanProgress" style="display:none" class="progress-wrap">
        <div class="progress-bar"><div id="progressFill" class="progress-fill" style="width:0"></div></div>
        <span id="progressTxt" class="progress-txt"></span>
      </div>
      <div id="apiList" class="api-list"></div>
      <div class="api-tip">✅ 绿色可用 &nbsp;❌ 红色不可用 &nbsp;— 未测试<br>拖动 ⋮⋮ 可排序，排第一的为主源</div>
    </div>

    <!-- ── 播放设置 ── -->
    <div id="tabPlay" class="tab-panel">
      <div class="form-row">
        <label>默认分辨率</label>
        <select id="cfgRes" class="sel-full">
          <option value="1080">1080P 超清</option>
          <option value="720">720P 高清</option>
          <option value="480">480P 标清</option>
          <option value="360">360P 流畅</option>
        </select>
      </div>
      <div class="form-row">
        <label>自动播放</label>
        <label class="toggle"><input type="checkbox" id="cfgAutoPlay"><span class="track"></span></label>
      </div>
      <div class="form-row">
        <label>记忆播放进度</label>
        <label class="toggle"><input type="checkbox" id="cfgProgress"><span class="track"></span></label>
      </div>
      <div class="form-row">
        <label>播放失败自动换源</label>
        <label class="toggle"><input type="checkbox" id="cfgAutoSrc"><span class="track"></span></label>
      </div>
      <button class="btn-primary w100" onclick="savePlayCfg()">保存</button>
    </div>

    <!-- ── D1 云同步 ── -->
    <div id="tabSync" class="tab-panel">
      <p style="font-size:13px;color:var(--c-text2);margin-bottom:14px;line-height:1.7">
        通过 <b>Cloudflare D1</b> 数据库实现多设备同步。<br>
        需要在 CF Dashboard 绑定 D1 数据库并设置 <code>SITE_PASSWORD</code> 环境变量。
      </p>
      <div class="form-row col" style="border-bottom:none">
        <label>同步状态</label>
        <div id="syncStatus" class="sync-status" style="display:block;background:var(--c-bg3);color:var(--c-text3)">未连接</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;padding:12px 0;border-bottom:1px solid var(--c-border)">
        <button class="btn-sm" onclick="d1Push('apis')">↑ 上传API列表</button>
        <button class="btn-sm" onclick="d1Pull('apis')">↓ 拉取API列表</button>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;padding:12px 0;border-bottom:1px solid var(--c-border)">
        <button class="btn-sm" onclick="d1Push('history')">↑ 上传观看历史</button>
        <button class="btn-sm" onclick="d1Pull('history')">↓ 拉取观看历史</button>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;padding:12px 0">
        <button class="btn-sm btn-accent" onclick="d1PushAll()">↑↑ 全量上传</button>
        <button class="btn-sm btn-accent" onclick="d1PullAll()">↓↓ 全量拉取</button>
      </div>
      <div class="api-tip" style="margin-top:8px">
        D1 同步使用当前网站密码进行鉴权，数据存储在你自己的 Cloudflare 账号中。
      </div>
    </div>

    <!-- ── 外观 ── -->
    <div id="tabAppear" class="tab-panel">
      <div class="form-row" style="border-bottom:none">
        <label>主题色</label>
        <div class="theme-prev">
          <div class="tp tp-dark on" onclick="setTheme('dark',this)" title="暗黑"></div>
          <div class="tp tp-light"  onclick="setTheme('light',this)" title="明亮"></div>
          <div class="tp tp-blue"   onclick="setTheme('blue',this)"  title="深空蓝"></div>
          <div class="tp tp-green"  onclick="setTheme('green',this)" title="暗夜绿"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 添加/编辑 API 弹窗 -->
<div class="overlay" id="apiOverlay" onclick="closeAddApi()" style="display:none"></div>
<div class="modal" id="apiModal" style="display:none">
  <div class="modal-hd">
    <h4 id="apiModalTitle">添加 API</h4>
    <button class="icon-btn" onclick="closeAddApi()">✕</button>
  </div>
  <div class="modal-body">
    <div class="form-row col" style="border-bottom:none;padding:0">
      <label>名称</label>
      <input type="text" id="apiName" class="inp" placeholder="例：闪电资源">
    </div>
    <div class="form-row col" style="border-bottom:none;padding:0">
      <label>API 地址（完整，含 wd= 结尾）</label>
      <input type="text" id="apiUrl" class="inp" placeholder="https://xxx.com/api.php/provide/vod/?ac=detail&wd=">
    </div>
    <div class="form-row col" style="border-bottom:none;padding:0">
      <label>备注（可选）</label>
      <input type="text" id="apiNote" class="inp" placeholder="例：画质好/更新快">
    </div>
    <div id="apiTestResult" class="api-test-result" style="display:none"></div>
    <div class="modal-actions">
      <button class="btn-sm" onclick="testSingleApi()">测试</button>
      <div style="flex:1"></div>
      <button class="btn-ghost-sm" onclick="closeAddApi()">取消</button>
      <button class="btn-primary" onclick="confirmApi()">确定</button>
    </div>
  </div>
</div>

<!-- 历史记录弹窗 -->
<div class="overlay" id="histOverlay" onclick="closeHist()" style="display:none"></div>
<div class="modal" id="histModal" style="display:none">
  <div class="modal-hd">
    <h4>观看历史</h4>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn-ghost-sm" onclick="clearHist()">清空</button>
      <button class="icon-btn" onclick="closeHist()">✕</button>
    </div>
  </div>
  <div class="hist-list" id="histList"></div>
</div>

<div id="toast" class="toast"></div>

<script src="js/api-pool.js"></script>
<script src="js/app.js"></script>
</body>
</html>
